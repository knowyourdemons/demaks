/* ───────── SCROLL ANIMATION HOOK ───────── */
function useReveal() {
  const ref = useRef(null);
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(
      ([e]) => { if (e.isIntersecting) { setVisible(true); obs.unobserve(el); } },
      { threshold: 0.12 }
    );
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return [ref, visible];
}

function Reveal({ children, delay = 0, style = {} }) {
  const [ref, visible] = useReveal();
  return (
    <div ref={ref} style={{
      opacity: visible ? 1 : 0,
      transform: visible ? "translateY(0)" : "translateY(32px)",
      transition: `opacity 0.7s cubic-bezier(.22,1,.36,1) ${delay}s, transform 0.7s cubic-bezier(.22,1,.36,1) ${delay}s`,
      ...style,
    }}>{children}</div>
  );
}

function CakeCalculator({ onRequest }) {
  const [diameter, setDiameter] = useState("");
  const [twoTier, setTwoTier] = useState(false);

  let match = null;
  let outOfRange = false;
  if (twoTier) {
    match = cakeSizes.find(s => s.twoTier);
  } else if (diameter !== "") {
    const d = Number(diameter);
    if (!Number.isNaN(d)) {
      match = cakeSizes.find(s => !s.twoTier && d >= s.dMin && d <= s.dMax);
      if (!match) outOfRange = true;
    }
  }

  return (
    <div style={{
      background: T.bgAlt, borderRadius: T.radiusSm, padding: 20,
      marginBottom: 24, border: `1px solid ${T.kraftLight}`,
    }}>
      <div style={{ fontSize: 13, fontWeight: 700, color: T.kraft, textTransform: "uppercase", letterSpacing: 1.5, marginBottom: 12 }}>
        Калькулятор размера
      </div>
      <div style={{ display: "flex", gap: 12, alignItems: "flex-end", flexWrap: "wrap" }}>
        <div style={{ flex: "1 1 180px" }}>
          <label style={{ display: "block", fontSize: 12, fontWeight: 600, color: T.textSoft, marginBottom: 6 }}>
            Диаметр торта (см)
          </label>
          <input
            type="number" min="10" max="40" inputMode="numeric"
            value={diameter}
            onChange={e => { setDiameter(e.target.value); setTwoTier(false); }}
            placeholder="например, 24"
            disabled={twoTier}
            style={{
              width: "100%", padding: "10px 14px", fontSize: 15,
              border: `1px solid ${T.border}`, borderRadius: T.radiusSm,
              fontFamily: "inherit", outline: "none",
              background: twoTier ? T.bgAlt : T.surface,
              opacity: twoTier ? 0.5 : 1,
            }}
          />
        </div>
        <label style={{ display: "flex", alignItems: "center", gap: 8, padding: "12px 0", fontSize: 14, cursor: "pointer", userSelect: "none" }}>
          <input type="checkbox" checked={twoTier} onChange={e => setTwoTier(e.target.checked)} style={{ width: 16, height: 16, accentColor: T.kraft }} />
          Двухъярусный
        </label>
      </div>
      {(match || outOfRange) && (
        <div style={{
          marginTop: 16, padding: "14px 16px",
          background: T.surface, borderRadius: T.radiusSm,
          border: `1px solid ${T.border}`,
        }}>
          {match ? (
            <>
              <div style={{ fontSize: 13, color: T.textSoft, marginBottom: 4 }}>Рекомендованная коробка</div>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 12, flexWrap: "wrap" }}>
                <div>
                  <div style={{ fontSize: 22, fontWeight: 800, color: T.text, letterSpacing: "-0.01em" }}>{match.box} см</div>
                  <div style={{ fontSize: 13, color: T.textMuted, marginTop: 2 }}>
                    Высота торта {match.height} · от {match.price} руб./шт при тираже от 50 шт
                  </div>
                </div>
                <a onClick={onRequest} style={{
                  background: T.primary, color: "white",
                  padding: "10px 18px", borderRadius: T.radiusSm,
                  fontSize: 13, fontWeight: 700, cursor: "pointer",
                  textDecoration: "none", whiteSpace: "nowrap",
                }}>Запросить расчёт</a>
              </div>
            </>
          ) : (
            <div style={{ fontSize: 14, color: T.textSoft, lineHeight: 1.6 }}>
              Нестандартный диаметр — сделаем под индивидуальный размер.{" "}
              <a onClick={onRequest} style={{ color: T.kraft, fontWeight: 600, cursor: "pointer", textDecoration: "underline" }}>Запросить расчёт</a>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function Photo({ name, size = "medium", alt, style = {}, eager = false, onClick }) {
  const dir = size === "large" ? PHOTOS_L : PHOTOS_M;
  return (
    <picture>
      <source srcSet={`${dir}/${name}.webp?${PHOTOS_V}`} type="image/webp" />
      <img
        src={`${dir}/${name}.jpg?${PHOTOS_V}`}
        alt={alt}
        loading={eager ? "eager" : "lazy"}
        decoding="async"
        fetchpriority={eager ? "high" : "auto"}
        onClick={onClick}
        style={{
          width: "100%", height: "100%", objectFit: "cover",
          display: "block", ...style,
        }}
      />
    </picture>
  );
}
